name: KELION AI – TARGETED DEPLOY

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to fearless-art
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: "d63cc3e3-8c6a-4952-862c-feec8fef0e2a"
          RAILWAY_SERVICE_ID: "e927d567-bd57-4e2b-87c9-ef00d4d015dc"
        run: |
          echo "🚀 Deploying directly to Project ID: $RAILWAY_PROJECT_ID"
          
          # Link directly using the ID found in screenshot
          railway link $RAILWAY_PROJECT_ID
          
          # Deploy
          echo "Pushing code..."
          railway up --service $RAILWAY_SERVICE_ID --detach

      - name: Verify
        run: |
          echo "⏳ Waiting for build..."
          sleep 60
          curl -I https://kelionai.app
