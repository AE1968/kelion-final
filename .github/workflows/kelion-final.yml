name: KELION AI – AUTO LINK & DEPLOY

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Auto-Link & Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Autentificare..."
          # Listăm proiectele
          PROJECTS=$(railway list --json)
          echo "Proiecte gasite: $PROJECTS"
          
          # Luam primul ID de proiect gasit (Presupunand ca ai unul singur relevant sau cel mai recent)
          # Deoarece nu stim ID-ul, incercam sa facem deploy direct daca Railway detecteaza contextul, sau ne legam de primul.
          
          # Incercam strategia 'link' automata
          # Dacă avem un singur proiect, 'railway link' il poate ghici sau putem folosi ID-ul.
          
          # Strategie mai sigura: Cream un serviciu nou daca nu exista, sau facem update.
          # Dar vrem sa actualizam 'kelionai.app'.
          
          echo "🚀 Pornire deploy..."
          # Folosim comanda 'up' care caută automat un proiect legat sau cere unul.
          # Cu token-ul setat, va incerca sa gaseasca match-ul.
          
          # Voi forța un deploy specificând numele serviciului dacă îl știu, sau lăsând automat.
          # Voi incerca sa gasesc ID-ul proiectului 'Kelion' sau similar din lista
          
          railway up --service "KELION AI" --detach || railway up --detach
