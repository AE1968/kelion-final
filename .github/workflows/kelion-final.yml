name: KELION AI – FORCE DEPLOY

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy via Token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Forcing deploy using Railway Token..."
          railway up --detach

      - name: Verify Site
        run: |
          echo "⏳ Waiting for deployment propagation..."
          sleep 60
          curl -I https://kelionai.app
