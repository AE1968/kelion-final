name: KELION AI – ULTIMATE AUTO DEPLOY

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          npm i -g @railway/cli
          sudo apt-get install jq -y

      - name: Auto-Discovery & Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Searching for Railway Project..."
          
          # Query GraphQL to get Project ID
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query": "query { me { projects { edges { node { id name } } } } }"}' \
            https://backboard.railway.app/graphql/v2)

          echo "Response: $RESPONSE"

          # Extract first Project ID using jq
          PROJECT_ID=$(echo $RESPONSE | jq -r '.data.me.projects.edges[0].node.id')
          PROJECT_NAME=$(echo $RESPONSE | jq -r '.data.me.projects.edges[0].node.name')

          if [ "$PROJECT_ID" == "null" ]; then
            echo "❌ Fatal: Could not find any project associated with this Token."
            exit 1
          fi

          echo "✅ FOUND PROJECT: $PROJECT_NAME (ID: $PROJECT_ID)"
          
          echo "🔗 Linking..."
          railway link $PROJECT_ID

          echo "🚀 DEPLOYING..."
          railway up --detach

      - name: Verify
        run: |
          sleep 60
          curl -I https://kelionai.app
